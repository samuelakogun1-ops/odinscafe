<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        .terminal-glow { box-shadow: 0 0 60px -15px rgba(59, 130, 246, 0.5); }
        .grid-bg {
            background-image: linear-gradient(to right, #111827 1px, transparent 1px), linear-gradient(to bottom, #111827 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative grid-bg">
    
    <div class="w-full max-w-md bg-slate-900/95 backdrop-blur-2xl border border-blue-500/40 rounded-3xl p-10 terminal-glow z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-2xl mb-6 shadow-2xl shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase">OdinCore</h1>
            <p class="text-blue-400 font-mono text-[10px] tracking-[0.4em] mt-2 uppercase">Secure Access Terminal</p>
        </div>

        <div id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">Authorized Staff ID</label>
                <input type="text" id="admin-id" placeholder="ENTER ID" class="w-full px-5 py-4 bg-black border border-slate-800 rounded-xl focus:border-blue-500 outline-none transition-all text-white font-mono uppercase">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">Security Passcode</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-5 py-4 bg-black border border-slate-800 rounded-xl focus:border-blue-500 outline-none transition-all text-white font-mono">
            </div>
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 font-bold rounded-xl shadow-xl shadow-blue-900/40 transition-all active:scale-95 text-white uppercase tracking-widest text-sm">
                Unlock Systems
            </button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 text-center hidden font-bold animate-pulse uppercase">Critical Error: Credentials Invalid</p>
        </div>

        <div id="success-state" class="hidden text-center py-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <div class="text-blue-400 font-mono text-xs tracking-widest">ACCESS GRANTED. INITIALIZING...</div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            const form = document.getElementById('loginForm');
            const success = document.getElementById('success-state');

            // Updated Credentials
            const VALID_ID = 'ADMIN-ODIN';
            const VALID_PASS = 'ODIN-SECURE-2026';

            if (id.toUpperCase() === VALID_ID && pass === VALID_PASS) {
                error.classList.add('hidden');
                form.classList.add('hidden');
                success.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = "admin%20management%20terminal.html";
                }, 1200);
            } else {
                error.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
