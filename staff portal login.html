<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Federal Banking Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: white; 
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }
        .bank-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(251, 191, 36, 0.1);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    
    <div class="w-full max-w-md bank-card rounded-[2.5rem] p-10 md:p-12 text-center">
        <!-- Federal Logo -->
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-amber-400 to-amber-600 rounded-3xl mb-8 shadow-2xl shadow-amber-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" />
            </svg>
        </div>

        <h1 class="text-3xl font-black tracking-tighter uppercase italic mb-2">ODINCORE</h1>
        <p class="text-amber-500 font-mono text-[10px] tracking-[0.4em] uppercase font-bold mb-10">Institutional Banking Core</p>

        <div id="loginForm" class="space-y-6 text-left">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Authorized Staff ID</label>
                <input type="text" id="admin-id" placeholder="ADMIN-ODIN" class="w-full px-6 py-4 bg-black/40 border border-slate-800 rounded-2xl focus:border-amber-500 outline-none transition-all text-white font-mono uppercase">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Security Passcode</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-6 py-4 bg-black/40 border border-slate-800 rounded-2xl focus:border-amber-500 outline-none transition-all text-white font-mono">
            </div>
            
            <button onclick="handleLogin()" class="w-full py-5 bg-amber-500 hover:bg-amber-400 text-slate-900 font-black rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs shadow-lg shadow-amber-500/10">
                Authorize Session
            </button>
            
            <p id="error-msg" class="hidden text-red-500 text-[10px] text-center font-bold uppercase tracking-widest mt-4">Invalid Credentials / Access Denied</p>
        </div>

        <div id="loading" class="hidden py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent mx-auto mb-4"></div>
            <p class="text-amber-500 mono text-xs uppercase tracking-widest font-bold">Verifying with Federal Reserve...</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            const form = document.getElementById('loginForm');
            const loading = document.getElementById('loading');

            // Banking Credentials
            if (id.toUpperCase() === 'ADMIN-ODIN' && pass === 'ODIN-SECURE-2026') {
                error.classList.add('hidden');
                form.classList.add('hidden');
                loading.classList.remove('hidden');
                
                // Redirecting to the EXACT filename in your GitHub
                setTimeout(() => {
                    window.location.href = "admin management terminal.html";
                }, 1500);
            } else {
                error.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
