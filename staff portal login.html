<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Odin Financial Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
        }
        .admin-glow { 
            box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.2); 
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 admin-glow">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Staff Portal</h1>
            <p class="text-slate-400 mt-1">Odin Financial Group Terminal</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1.5" for="admin-id">Admin Identifier</label>
                <input 
                    type="text" 
                    id="admin-id" 
                    placeholder="Enter your staff ID" 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 text-white rounded-lg transition-all"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1.5" for="password">Security Key</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 text-white rounded-lg transition-all"
                    required
                >
            </div>

            <div class="pt-2">
                <button 
                    type="submit" 
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow-lg shadow-blue-900/40 transition-all active:scale-[0.98]"
                >
                    Authenticate Access
                </button>
            </div>
        </form>

        <!-- Footer Info -->
        <div class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-500 leading-relaxed uppercase tracking-widest">
                Classified System <br>
                Authorized Personnel Only
            </p>
        </div>
    </div>

    <!-- Simple Success/Error Notification -->
    <div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-lg text-white font-medium transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const adminId = document.getElementById('admin-id').value;
            const password = document.getElementById('password').value;
            const toast = document.getElementById('toast');

            // Simple demo authentication logic
            if (adminId && password) {
                showToast("Authenticating credentials...", "bg-blue-600");
                
                // Simulate a slight delay for the "secure" feel
                setTimeout(() => {
                    showToast("Access Granted. Redirecting to Terminal...", "bg-green-600");
                }, 1500);
            }
        });

        function showToast(message, bgColor) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-lg text-white font-medium transform transition-all duration-300 ${bgColor}`;
            
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
