<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Odin Financial Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .admin-glow { box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- Brand -->
        <div class="text-center mb-10">
            <div class="inline-block px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-4">
                Internal Systems
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter">ODIN<span class="text-blue-500">CORE</span></h1>
            <p class="text-slate-500 text-sm mt-2 font-medium">Global Administration Terminal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900 rounded-[2.5rem] p-10 border border-slate-800 admin-glow">
            <form id="adminForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Staff Employee ID</label>
                    <input type="text" required placeholder="ADM-99-0000" 
                        class="w-full px-6 py-4 rounded-2xl bg-slate-950 border border-slate-800 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition font-mono">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Security Passcode</label>
                    <input type="password" required placeholder="••••••••" 
                        class="w-full px-6 py-4 rounded-2xl bg-slate-950 border border-slate-800 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-blue-900/20">
                        Access Control Center
                    </button>
                </div>
            </form>
        </div>

        <!-- Warning Footer -->
        <div class="mt-10 text-center">
            <div class="inline-flex items-center gap-2 text-slate-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Unauthorized Access is Prohibited</span>
            </div>
            <p class="text-[10px] text-slate-700 mt-4 leading-relaxed">
                This system is for authorized Odin Financial personnel only. All activities are logged and monitored under federal banking regulations.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // In a real app, this would check credentials. 
            // For your prototype, it leads directly to the admin dashboard.
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
