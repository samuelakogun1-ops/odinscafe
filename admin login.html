<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Odin Financial Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .admin-glow { box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 admin-glow">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight">Staff Portal</h1>
            <p class="text-slate-400 mt-1">Odin Financial Group Terminal</p>
        </div>

        <div id="loginForm">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">STAFF EMPLOYEE ID</label>
                    <input type="text" id="admin-id" placeholder="ADM-99-0000" class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg focus:border-blue-500 outline-none transition-all text-white">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">SECURITY PASSCODE</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg focus:border-blue-500 outline-none transition-all text-white">
                </div>
                <button onclick="handleLogin()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 font-bold rounded-lg shadow-lg shadow-blue-900/40 transition-all active:scale-95 text-white">
                    Access Control Center
                </button>
            </div>
            <p id="error-msg" class="text-red-400 text-sm mt-4 text-center hidden">Invalid credentials. Access Denied.</p>
        </div>

        <div id="success-state" class="hidden text-center py-4">
            <div class="text-green-400 mb-2 font-bold">✓ Authentication Successful</div>
            <p class="text-slate-400 text-sm">Loading Management Terminal...</p>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-500 uppercase tracking-widest">Authorized Personnel Only</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            const form = document.getElementById('loginForm');
            const success = document.getElementById('success-state');

            // Fixed Credentials
            if (id === 'ADM-99-0000' && pass === 'odin@2024') {
                error.classList.add('hidden');
                form.classList.add('hidden');
                success.classList.remove('hidden');
                
                // Redirecting to the correct filename in your GitHub
                setTimeout(() => {
                    window.location.href = "admin%20management%20terminal.html";
                }, 1000);
            } else {
                error.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
