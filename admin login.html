<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Federal Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .bank-glow { box-shadow: 0 0 60px -15px rgba(251, 191, 36, 0.3); }
        .grid-bg {
            background-image: linear-gradient(to right, #0f172a 1px, transparent 1px), linear-gradient(to bottom, #0f172a 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative grid-bg px-4">
    
    <div class="w-full max-w-md bg-slate-900/90 backdrop-blur-3xl border border-amber-500/30 rounded-[2.5rem] p-8 md:p-12 bank-glow z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-400 to-amber-600 rounded-2xl mb-6 shadow-2xl shadow-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">ODINCORE</h1>
            <p class="text-amber-500 font-mono text-[9px] tracking-[0.4em] mt-2 uppercase font-bold">Banking Core Authentication</p>
        </div>

        <div id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 px-1">Authorized Staff ID</label>
                <input type="text" id="admin-id" placeholder="ID-NUMBER" class="w-full px-6 py-4 bg-black/50 border border-slate-800 rounded-2xl focus:border-amber-500 outline-none transition-all text-white font-mono uppercase">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 px-1">Security Passcode</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-6 py-4 bg-black/50 border border-slate-800 rounded-2xl focus:border-amber-500 outline-none transition-all text-white font-mono">
            </div>
            <button onclick="handleLogin()" class="w-full py-5 bg-amber-500 hover:bg-amber-400 font-black rounded-2xl shadow-xl shadow-amber-900/20 transition-all active:scale-95 text-slate-900 uppercase tracking-widest text-xs">
                Authorize Session
            </button>
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 text-center hidden font-black animate-pulse uppercase tracking-widest">Access Denied: Protocol Violation</p>
        </div>

        <div id="success-state" class="hidden text-center py-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-amber-500 border-t-transparent mb-4"></div>
            <div class="text-amber-500 font-mono text-[10px] tracking-[0.3em] uppercase font-bold">Establishing Secure Link...</div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            const form = document.getElementById('loginForm');
            const success = document.getElementById('success-state');

            // CREDENTIALS
            const VALID_ID = 'ADMIN-ODIN';
            const VALID_PASS = 'ODIN-SECURE-2026';

            if (id.toUpperCase() === VALID_ID && pass === VALID_PASS) {
                error.classList.add('hidden');
                form.classList.add('hidden');
                success.classList.remove('hidden');
                
                // FIXED REDIRECT: Matches your GitHub filename exactly
                setTimeout(() => {
                    window.location.href = "admin management terminal.html";
                }, 1000);
            } else {
                error.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
