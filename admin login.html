<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Federal Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .bank-glow { box-shadow: 0 0 60px -15px rgba(251, 191, 36, 0.3); border: 1px solid rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="p-6">
    
    <div class="w-full max-w-md bg-slate-900 rounded-[2.5rem] p-10 md:p-12 bank-glow">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">ODINCORE</h1>
            <p class="text-amber-500 font-mono text-[10px] tracking-[0.4em] mt-2 uppercase font-bold">Banking Core Login</p>
        </div>

        <div id="loginForm" class="space-y-6">
            <input type="text" id="admin-id" placeholder="STAFF ID" class="w-full px-6 py-4 bg-black border border-slate-800 rounded-2xl focus:border-amber-500 outline-none text-white font-mono uppercase">
            <input type="password" id="password" placeholder="PASSCODE" class="w-full px-6 py-4 bg-black border border-slate-800 rounded-2xl focus:border-amber-500 outline-none text-white font-mono">
            <button onclick="handleLogin()" class="w-full py-5 bg-amber-500 hover:bg-amber-400 font-black rounded-2xl text-slate-900 uppercase tracking-widest text-xs">Authorize Session</button>
            <p id="error-msg" class="text-red-500 text-[10px] text-center hidden font-black uppercase">Access Denied</p>
        </div>

        <div id="loading" class="hidden text-center py-6">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-amber-500 border-t-transparent mx-auto mb-4"></div>
            <p class="text-amber-500 font-mono text-[10px] uppercase font-bold">Redirecting to Terminal...</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value.trim().toUpperCase();
            const pass = document.getElementById('password').value.trim();
            
            // VALID CREDENTIALS
            if (id === 'ADMIN-ODIN' && pass === 'ODIN-SECURE-2026') {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('loading').classList.remove('hidden');
                
                // Use location.replace to force the browser to navigate
                // This targets your exact file name on GitHub
                setTimeout(() => {
                    window.location.replace("admin management terminal.html");
                }, 800);
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
